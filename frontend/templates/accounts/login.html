{% extends 'common/base.html' %}
{% load widget_tweaks %}

{% block content %}
<style>
    body {
        background: #f8faff;
        font-family: "Inter", sans-serif;
    }

    .login-wrapper {
        max-width: 380px;
        margin: 70px auto;
        background: #ffffff;
        padding: 35px;
        border-radius: 18px;
        box-shadow: 0px 8px 25px rgba(0,0,0,0.06);
    }

    .login-title {
        font-size: 26px;
        font-weight: 600;
        color: #1b1f3b;
    }

    .form-control {
        height: 52px;
        border-radius: 12px !important;
        border: 1px solid #d7dce5;
        padding-left: 14px;
        font-size: 15px;
        transition: .2s;
    }

    .form-control:focus {
        border-color: #5969f3;
        box-shadow: 0 0 0 3px rgba(89,105,243,0.15);
    }

    .input-group-text {
        background: #eef0ff;
        border: 1px solid #d7dce5;
        border-left: 0;
        border-radius: 0 12px 12px 0 !important;
        font-size: 14px;
        color: #5969f3;
        font-weight: 500;
    }

    .input-group .form-control {
        border-right: 0;
        border-radius: 12px 0 0 12px !important;
    }

    .btn-primary {
        height: 50px;
        border-radius: 12px;
        background: linear-gradient(90deg, #5f72ff, #5969f3);
        border: none;
        font-size: 17px;
        font-weight: 500;
        transition: .2s;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(89,105,243,0.25);
    }

    .form-check-label {
        font-size: 14px;
    }

</style>

<main id="main">
    <section class="contact">
        <div class="row align-items-center justify-content-center">
            <div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center"
                 style="background: #f8faff;">
                <img src="/static/img/hero-img.png" class="img-fluid" alt="">
            </div>
                    <div class="login-wrapper text-center m-4 m-lg-0">

            <a href="#">
                <img src="{{global.logo.url}}" width="60" class="mb-3">
            </a>

            <h3 class="login-title mb-4">Sign-in to NetRMM</h3>

            <form method="post">
                {% csrf_token %}

                <label class="text-start w-100 mb-1 fw-medium">Registered Subdomain</label>
                <div class="input-group mb-3">
                    <input type="text" id="subdomain" name="subdomain"
                        class="form-control" placeholder="Enter subdomain">
                    <span class="input-group-text">netrmm.com</span>
                </div>

                <label class="text-start w-100 mb-1 fw-medium">Username</label>
                <input type="text" id="username" name="username"
                       class="form-control mb-3" placeholder="Enter username">

                <label class="text-start w-100 mb-1 fw-medium">Password</label>
                <input type="password" id="password" name="password"
                       class="form-control mb-3" placeholder="Enter password">

                <div class="form-check text-start my-3">
                    <input class="form-check-input" type="checkbox" name="remember" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>

                <button class="btn btn-primary w-100" type="submit">Sign in</button>

                <p class="mt-4 mb-2 text-muted">© 2021 – {% now 'Y' %}</p>
            </form>
        </div>
        </div>

    </section>
</main>
{% endblock %}
